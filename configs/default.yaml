model:
  name: "models/Qwen2.5-0.5B-hf"
  dtype: bfloat16
  device: "cuda"

strategy:
  name: baseline
  budget_ratio: 0.3
  min_budget: 64
  max_cache_capacity: 2048

max_seq_length: 2048

tasks:
  - name: perplexity
    stride: 1024
    corpus_file: "data/wikitext103_test.txt"

output:
  dir: results/
  save_checkpoints: true
